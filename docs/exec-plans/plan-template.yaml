# Execution Plan Template — copy and rename to <plan-id>.yaml
# Generated by: skills/exec_plan.py  (python skills/exec_plan.py init --title "My Plan")
# ---------------------------------------------------------------------------
# Field reference
# ---------------------------------------------------------------------------
#   assigned_agent  — agent ID currently responsible for the task, or ""
#   lock_status     — unlocked | locked | done
#                       unlocked : no agent holds the task
#                       locked   : an agent has claimed it (see assigned_agent)
#                       done     : task is complete and the lock released
#   depends_on      — list of TASK-NNN IDs that must be `done` before this
#                     task may start; [] means no dependencies (can run now)
# ---------------------------------------------------------------------------

plan:
  id: PLAN-000
  title: "<plan title>"
  created_at: "YYYY-MM-DDTHH:MM:SSZ"
  updated_at: "YYYY-MM-DDTHH:MM:SSZ"
  status: pending          # pending | running | done | blocked | cancelled

  # ---------------------------------------------------------------------------
  # Plan-to-PR traceability  (see docs/plan-to-pr-convention.md)
  # ---------------------------------------------------------------------------
  # Populate linked_prs AFTER each PR is opened.  Agents must update this
  # field immediately after `gh pr create` returns the PR URL.
  # ---------------------------------------------------------------------------
  linked_prs: []
  # Example (fill in after opening PRs):
  # linked_prs:
  #   - pr_url: "https://github.com/org/repo/pull/42"
  #     pr_number: 42
  #     opened_at: "YYYY-MM-DDTHH:MM:SSZ"
  #     opened_by: "<agent-id>"         # e.g. coding-03abe8fb
  #     tasks_addressed:                # TASK IDs closed by this PR
  #       - TASK-001
  #       - TASK-002

# ---------------------------------------------------------------------------
# Task dependency graph
# ---------------------------------------------------------------------------
# Visualised:
#
#   TASK-001 ──► TASK-003 ──► TASK-005
#   TASK-002 ──┘             ▲
#                TASK-004 ───┘
#
# Any task whose depends_on list is empty (or all entries are done) is
# immediately runnable.  Use `python skills/exec_plan.py ready` to list them.
# ---------------------------------------------------------------------------

tasks:
  - id: TASK-001
    title: "<first task>"
    description: ""
    assigned_agent: ""       # e.g. coding-03abe8fb
    lock_status: unlocked    # unlocked | locked | done
    depends_on: []           # no upstream dependencies — can start immediately
    status: pending          # pending | running | done | blocked | skipped
    priority: medium         # critical | high | medium | low
    started_at: null
    completed_at: null
    notes: ""
    # Context assembly hints for this specific task (subset of plan-level context).
    # Fill in so agents assigned to this task can locate the relevant code
    # without reading the whole codebase.
    context:
      grep_patterns: []    # task-specific search patterns
      glob_patterns: []    # task-specific file globs
      symbol_refs: []      # task-specific symbol names

  - id: TASK-002
    title: "<second task — runs in parallel with TASK-001>"
    description: ""
    assigned_agent: ""
    lock_status: unlocked
    depends_on: []
    status: pending
    priority: medium
    started_at: null
    completed_at: null
    notes: ""
    context:
      grep_patterns: []    # task-specific search patterns
      glob_patterns: []    # task-specific file globs
      symbol_refs: []      # task-specific symbol names

  - id: TASK-003
    title: "<third task — waits for TASK-001 and TASK-002>"
    description: ""
    assigned_agent: ""
    lock_status: unlocked
    depends_on:
      - TASK-001
      - TASK-002
    status: pending
    priority: medium
    started_at: null
    completed_at: null
    notes: ""
    context:
      grep_patterns: []    # task-specific search patterns
      glob_patterns: []    # task-specific file globs
      symbol_refs: []      # task-specific symbol names

  - id: TASK-004
    title: "<fourth task — independent branch>"
    description: ""
    assigned_agent: ""
    lock_status: unlocked
    depends_on: []
    status: pending
    priority: low
    started_at: null
    completed_at: null
    notes: ""
    context:
      grep_patterns: []    # task-specific search patterns
      glob_patterns: []    # task-specific file globs
      symbol_refs: []      # task-specific symbol names

  - id: TASK-005
    title: "<fifth task — final gate, waits for TASK-003 and TASK-004>"
    description: ""
    assigned_agent: ""
    lock_status: unlocked
    depends_on:
      - TASK-003
      - TASK-004
    status: pending
    priority: high
    started_at: null
    completed_at: null
    notes: ""
    context:
      grep_patterns: []    # task-specific search patterns
      glob_patterns: []    # task-specific file globs
      symbol_refs: []      # task-specific symbol names

# ---------------------------------------------------------------------------
# Multi-agent coordination notes
# ---------------------------------------------------------------------------
coordination:
  strategy: parallel-with-serialised-hotspots
  hotspot_files: []          # list file paths that multiple tasks will touch
  merge_order: []            # suggested agent merge sequence for hotspots
  post_merge_checklist: []   # steps to run after all tasks complete

# ---------------------------------------------------------------------------
# Context assembly
# ---------------------------------------------------------------------------
# This section gives agents a map — not the territory — so they can rebuild
# their working context from scratch using Grep, Glob, and Read tools.
#
#   grep_patterns  — regex strings (grep -E compatible) for finding key symbols,
#                    class/function names, config keys, import paths, etc.
#   glob_patterns  — file-path globs (e.g. src/auth/**/*.py) for Glob tool
#   symbol_refs    — bare symbol names to search for: class names, function
#                    names, constants, CLI flags, env-var names
#   key_files      — specific file paths most relevant to this plan, ordered
#                    by importance; listed as path: "…"  reason: "…" pairs
#   rationale      — one sentence explaining why these patterns are the right
#                    entry points for this plan
# ---------------------------------------------------------------------------
context_assembly:
  grep_patterns:
    - "<ClassName|function_name>"      # e.g. "class AuthService"
    - "<CONSTANT_NAME>"                # e.g. "JWT_SECRET"
    - "<import path>"                  # e.g. "from auth import"
  glob_patterns:
    - "src/<domain>/**/*.py"           # e.g. "src/auth/**/*.py"
    - "tests/**/test_<domain>*.py"     # e.g. "tests/**/test_auth*.py"
  symbol_refs:
    - "<ClassName>"
    - "<function_name>"
    - "<CONSTANT_NAME>"
  key_files:
    - path: "<relative/path/to/entry.py>"
      reason: "<why this file matters>"
  rationale: "<one sentence: why these patterns are the right entry points>"
