# .ls-lint.yml — generated by /file-naming-convention 1.0.0 on 2026-03-24
# Docs: https://ls-lint.org
# Re-generate: /file-naming-convention --lint-only
#
# Detected from 309 tracked files across 10 extensions.
# See FILE-NAMING.md for the full spec and rationale.

ls:
  # ── Python ─────────────────────────────────────────────────────────────────
  # Dominant style: snake_case (100 %, 167 samples)
  .py: snake_case

  # ── Markdown ───────────────────────────────────────────────────────────────
  # Dominant style: kebab-case (91 %, 97 samples)
  .md: kebab-case | regex:^[A-Z][A-Z_]+$   # allow ALL_CAPS names (README, AGENTS, etc.)

  # ── YAML ───────────────────────────────────────────────────────────────────
  # Dominant style: kebab-case (.yml 92 % / 12 samples, .yaml 100 % / 9 samples)
  .yml:  kebab-case | snake_case   # snake_case allowed for sub-extension files (e.g. loki.yaml)
  .yaml: kebab-case | snake_case

  # ── Shell scripts ──────────────────────────────────────────────────────────
  # Dominant style: kebab-case (88 %, 8 samples)
  .sh: kebab-case | snake_case

  # ── JSON ───────────────────────────────────────────────────────────────────
  # ⚠️  MIXED styles detected — no single dominant convention (12 samples):
  #     kebab-case ≈ 33 %  (harness-telemetry.json, perf-timers.json)
  #     snake_case ≈ 25 %  (plan_example.json, log_entry.schema.json)
  #
  #   Both styles are permitted until the team agrees on a standard.
  #   Recommended: adopt kebab-case for plain JSON; snake_case for *.schema.json.
  #   Uncomment ONE of the lines below to lock the convention:
  #   .json: kebab-case
  #   .json: snake_case
  #   .json: kebab-case | snake_case
  .json: kebab-case | snake_case

ignore:
  # ── Ecosystem-mandated names ────────────────────────────────────────────────
  - README.md
  - CHANGELOG.md
  - CHANGELOG
  - LICENSE
  - Makefile
  - Dockerfile
  - Procfile

  # ── Claude / claw-forge conventions ────────────────────────────────────────
  - CLAUDE.md
  - AGENTS.md
  - SKILL.md
  - FILE-NAMING.md
  - harness_manifest.json
  - claw-forge.yaml
  - harness.config.yaml

  # ── Python packaging / tooling ─────────────────────────────────────────────
  - conftest.py
  - pyproject.toml
  - uv.lock


  # ── CI / DevOps tooling ────────────────────────────────────────────────────
  - .gitlab-ci.yml
  - .pre-commit-config.yaml
  - .editorconfig
  - .gitignore
  - .gitattributes
  - .python-version
  - .env.example

  # ── Generated / lock files ─────────────────────────────────────────────────
  - uv.lock

  # ── Directories to skip entirely ───────────────────────────────────────────
  - .git
  - node_modules
  - __pycache__
  - .venv
  - venv
  - dist
  - build
  - .next
  - .nuxt
  - .mypy_cache
  - .pytest_cache
  - .ruff_cache
