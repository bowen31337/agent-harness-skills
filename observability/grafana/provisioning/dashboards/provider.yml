# Grafana dashboard provider — loads JSON dashboards from the dashboards/ folder
apiVersion: 1

providers:
  - name: local-dev
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
