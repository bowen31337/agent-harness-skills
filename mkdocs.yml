site_name: Harness Skills
site_description: Agent harness engineering toolkit documentation
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest

nav:
  - Home: index.md
  - CLI Commands:
    # Per-command reference pages (cli/<cmd>.md) are not yet written —
    # add nav entries here as those files land. For now the overview lists
    # the full 17-command surface with one-liners.
    - Overview: cli/index.md
  - Agents Guide:
    - CLI Reference: agents/cli-commands.md
  - Architecture:
    - Decision Records: architecture/README.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
