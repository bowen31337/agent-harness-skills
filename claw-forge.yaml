# claw-forge configuration — generated by `claw-forge init`
# Edit providers below, then copy .env.example → .env and fill in your keys.

model_aliases:
  opus:   ${MODEL_OPUS:-claude-opus-4-6}
  sonnet: ${MODEL_SONNET:-claude-sonnet-4-6}
  haiku:  ${MODEL_HAIKU:-claude-haiku-4-6}
  fast:   ${MODEL_FAST:-claude-haiku-4-6}

pool:
  strategy: priority
  max_retries: 3
  failure_threshold: 5
  recovery_timeout: 60

providers:
  # Claude OAuth — run `claude setup-token` once, paste token into .env
  claude-oauth:
    type: anthropic_oauth
    oauth_token: ${ANTHROPIC_OAUTH_TOKEN}   # from `claude setup-token`
    priority: 1
    enabled: true

  # Direct Anthropic API key (set enabled: true and add ANTHROPIC_API_KEY to .env)
  anthropic-direct:
    type: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    priority: 2
    enabled: false

  # Anthropic-compatible proxy (optional)
  # anthropic-proxy:
  #   type: anthropic_compat
  #   api_key: ${PROXY_API_KEY}
  #   base_url: ${PROXY_BASE_URL}
  #   model: ${PROXY_MODEL}
  #   priority: 3
  #   enabled: true

  # Local Ollama (optional, free)
  # local-ollama:
  #   type: ollama
  #   base_url: http://localhost:11434
  #   model: qwen2.5:32b
  #   priority: 10
  #   enabled: true

agent:
  default_model: ${MODEL_DEFAULT:-claude-sonnet-4-6}
  max_tokens: 8192
  max_concurrent_agents: 5

skills:
  - pyright
  - typescript-lsp
  - rust-analyzer
  - systematic-debug
  - git-workflow

state:
  database_url: "sqlite+aiosqlite:///claw_forge.db"
  host: "0.0.0.0"
  port: 8420

git:
  enabled: true
  merge_strategy: auto    # auto | manual
  branch_prefix: feat
  commit_on_plugin_boundary: true
