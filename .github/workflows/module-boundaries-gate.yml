# .github/workflows/module-boundaries-gate.yml
# Module Boundary Compliance Gate
#
# Scans every pull request for deep sub-module imports that bypass a package's
# declared __init__.py surface.  Any violation causes this job to exit non-zero,
# blocking merge until the offending import is fixed.
#
# Generated by /module-boundaries on 2026-03-23.
# Re-run `/module-boundaries` to refresh the domain list and this workflow.
#
# Principle enforced: MB002–MB010, MB015 (.claude/principles.yaml)
# Script:            scripts/check_module_boundaries.py
# Exit codes:  0 = passed, 1 = violations found, 2 = internal error

name: Module Boundary Gate

on:
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "spec/**"
      - "LICENSE"
      - ".gitignore"

jobs:
  module-boundaries:
    name: Module Boundary Compliance Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      # ── Module Boundary Scanner ────────────────────────────────────────────
      - name: Run module boundary scanner
        id: boundaries
        run: |
          set +e

          # Human-readable output to the log
          uv run python scripts/check_module_boundaries.py \
            --root . \
            --format human
          exit_code=$?

          # JSON report for the step summary and artifact
          uv run python scripts/check_module_boundaries.py \
            --root . \
            --format json \
            --output module-boundaries-report.json || true

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

          passed=$(python3 -c \
            "import json; r=json.load(open('module-boundaries-report.json')); \
             print(str(r.get('passed', False)).lower())" \
            2>/dev/null || echo "false")
          echo "passed=$passed" >> "$GITHUB_OUTPUT"

          exit $exit_code

      # ── GitHub Step Summary ────────────────────────────────────────────────
      - name: Write step summary
        if: always()
        run: |
          if [ ! -f module-boundaries-report.json ]; then
            echo "## Module Boundary Gate — report missing" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          passed=$(python3 -c \
            "import json; r=json.load(open('module-boundaries-report.json')); \
             print(r.get('passed', False))" 2>/dev/null || echo "False")

          total=$(python3 -c \
            "import json; r=json.load(open('module-boundaries-report.json')); \
             print(r.get('summary',{}).get('total_violations',0))" 2>/dev/null || echo "?")

          domains_hit=$(python3 -c \
            "import json; r=json.load(open('module-boundaries-report.json')); \
             print(r.get('summary',{}).get('domains_with_violations',0))" 2>/dev/null || echo "?")

          private_hit=$(python3 -c \
            "import json; r=json.load(open('module-boundaries-report.json')); \
             print(r.get('summary',{}).get('private_symbol_violations',0))" 2>/dev/null || echo "?")

          files=$(python3 -c \
            "import json; r=json.load(open('module-boundaries-report.json')); \
             print(r.get('summary',{}).get('files_scanned',0))" 2>/dev/null || echo "?")

          if [ "$passed" = "True" ]; then
            icon="✅"
            headline="All module boundary checks passed"
          else
            icon="❌"
            headline="Module boundary gate FAILED — PR blocked"
          fi

          {
            echo "## $icon Module Boundary Gate — $headline"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Files scanned | $files |"
            echo "| 🔴 Total violations | $total |"
            echo "| Domains with violations | $domains_hit |"
            echo "| Private symbol violations | $private_hit |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Detail violations per domain
          python3 - <<'PYEOF' >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          import json, sys
          try:
              r = json.load(open("module-boundaries-report.json"))
          except Exception:
              sys.exit(0)
          viols = r.get("violations", [])
          if not viols:
              print("_No module boundary violations detected._")
              sys.exit(0)
          # Group by domain
          by_domain: dict = {}
          for v in viols:
              by_domain.setdefault(v["domain"], []).append(v)
          print("### 🔴 Violations by Domain\n")
          for domain, entries in sorted(by_domain.items()):
              pid = entries[0]["principle_id"]
              print(f"#### [{pid}] `{domain}` — {len(entries)} violation(s)\n")
              for v in entries:
                  priv = " *(private symbol)*" if v.get("is_private") else ""
                  print(f"- `{v['file']}:{v['line']}`{priv}")
                  print(f"  ```python")
                  print(f"  {v['text']}")
                  print(f"  ```")
              print()
          print("---")
          print("**Fix:** replace `from <pkg>.<submodule> import X` with `from <pkg> import X`.")
          print("See `.claude/principles.yaml` MB002–MB015 for per-domain rules.")
          PYEOF

          if [ "$passed" != "True" ]; then
            exit 1
          fi

      # ── Upload report artifact ─────────────────────────────────────────────
      - name: Upload boundary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-boundaries-report
          path: module-boundaries-report.json
          retention-days: 30
