name: Deploy Site

# Deploys a single GitHub Pages artifact containing both the React tutorial
# (served at the site root) and the mkdocs documentation (served at /docs/).
# Pages only allows one workflow_dispatch deploy at a time, so combining the
# two avoids the last-to-run-wins clobbering that two separate workflows
# would race into.

on:
  push:
    branches: [main]
    paths:
      - 'tutorial/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.github/workflows/deploy-tutorial.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Opt JS-based actions into Node.js 24 ahead of GitHub's June-2026 forced
# migration. Silences the "Node.js 20 actions are deprecated" warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tutorial/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: tutorial

      - name: Lint (Biome)
        run: npx biome check src/ tests/
        working-directory: tutorial

      - name: Test (Vitest)
        run: npm test -- --run
        working-directory: tutorial

      - name: Build tutorial
        run: npm run build
        working-directory: tutorial

      # ── mkdocs documentation build ──────────────────────────────────────
      - name: Set up Python for mkdocs
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install mkdocs deps
        run: uv sync --extra dev --python 3.12

      - name: Build docs (mkdocs --strict)
        run: uv run mkdocs build --strict --site-dir site

      - name: Merge docs into tutorial dist
        # mkdocs site/ → tutorial/dist/docs/ so the unified artifact serves
        # tutorial at / and docs at /docs/.
        run: |
          mkdir -p tutorial/dist/docs
          cp -R site/. tutorial/dist/docs/

      # ── Pages deploy ────────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: tutorial/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
