# .github/workflows/type-gate.yml
# Type Safety Gate
# Runs mypy (strict) via harness evaluate --gate types on every pull request.
# Zero type errors are tolerated — any error-severity finding blocks the PR.
# Exit codes: 0 = all checks passed, 1 = type errors found, 2 = internal error.
name: Type Safety Gate

on:
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "spec/**"
      - "LICENSE"
      - ".gitignore"

jobs:
  type-gate:
    name: Type Safety (mypy strict · zero errors)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      # ── Run the type checker gate ─────────────────────────────────────────────
      - name: Run type safety gate
        id: types
        run: |
          set +e
          result=$(uv run harness evaluate \
            --gate types \
            --fail-on error \
            --format json 2>&1)
          exit_code=$?
          echo "$result" | tee type-report.json
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "passed=$(echo "$result" | jq -r '.passed // false')" >> "$GITHUB_OUTPUT"
          exit $exit_code

      # ── Write a rich job summary ──────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          if [ ! -f type-report.json ]; then
            echo "No type report found — harness may have crashed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          passed=$(jq -r '.passed // false' type-report.json)
          if [ "$passed" = "true" ]; then
            icon="✅"
            headline="Type checker passed — zero errors"
          else
            icon="❌"
            headline="Type errors detected — PR blocked"
          fi

          {
            echo "## $icon Type Safety Gate — $headline"
            echo ""
            echo "> Checker: **mypy (strict mode)** · Policy: **zero errors tolerated**"
            echo ""

            jq -r '
              .summary as $s |
              "| Metric | Value |",
              "|--------|-------|",
              "| Gates passed | \($s.passed_gates)/\($s.total_gates) |",
              "| Blocking errors | \($s.blocking_failures) |",
              "| Total findings | \($s.total_failures) |"
            ' type-report.json

            echo ""

            error_count=$(jq '[.failures[] | select(.severity == "error")] | length' type-report.json)
            if [ "${error_count:-0}" -gt 0 ]; then
              echo "### ❌ Blocking Type Errors"
              echo ""
              jq -r '
                .failures[] | select(.severity == "error") |
                "- **\(.message)**" +
                (if .file_path then
                  " — `\(.file_path)" +
                  (if .line_number then ":\(.line_number)" else "" end) + "`"
                else "" end) +
                (if .rule_id then "\n  > 🔖 Rule: `\(.rule_id)`" else "" end) +
                (if .suggestion then "\n  > 💡 \(.suggestion)" else "" end)
              ' type-report.json
              echo ""
            fi

            warn_count=$(jq '[.failures[] | select(.severity == "warning")] | length' type-report.json)
            if [ "${warn_count:-0}" -gt 0 ]; then
              echo "### ⚠️ Warnings (non-blocking)"
              echo ""
              jq -r '
                .failures[] | select(.severity == "warning") |
                "- \(.message)" +
                (if .file_path then
                  " — `\(.file_path)" +
                  (if .line_number then ":\(.line_number)" else "" end) + "`"
                else "" end)
              ' type-report.json
            fi

          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload type report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: type-gate-report
          path: type-report.json
          retention-days: 30
