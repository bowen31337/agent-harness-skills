# ── Providers Pattern — cross-cutting concerns (generated by /module-boundaries) ──
# IDs MB011–MB014. Re-running /module-boundaries updates these in-place.

  - id: "MB011"
    category: "architecture"
    severity: "blocking"
    applies_to: ["review-pr", "check-code"]
    rule: >
      LOGGING PROVIDER — all production code must obtain loggers exclusively via
      `from harness_skills.logging_config import get_logger` followed by
      `logger = get_logger("<domain>")`. Calling `logging.getLogger()` directly
      in domain code is forbidden; it bypasses trace-ID injection, domain-field
      tagging, and the structured JSON formatter configured by `configure()`.
      The only permitted direct use of `logging.getLogger()` is inside
      harness_skills/logging_config.py itself (the provider implementation).
      Open violations that must be migrated:
        stale_plan_detector.py:44          → log = logging.getLogger("stale_detector")
        harness_skills/plugins/loader.py:8 → logger = logging.getLogger("harness_skills.plugins.loader")
        harness_skills/plugins/runner.py:7 → logger = logging.getLogger("harness_skills.plugins.runner")
      Migration: replace with `from harness_skills.logging_config import get_logger`
      and `logger = get_logger("<domain>")` at module level.
      `print()` and `sys.stdout.write()` for diagnostic output are equally forbidden
      (see P023).

  - id: "MB012"
    category: "architecture"
    severity: "blocking"
    applies_to: ["review-pr", "check-code"]
    rule: >
      CONFIG PROVIDER — all code that reads harness.config.yaml must do so
      exclusively through `HarnessConfigLoader` (re-exported from
      harness_skills.gates). Domain code must never open harness.config.yaml
      directly via `open()`, `yaml.safe_load()`, `pathlib.Path.read_text()`, or
      any equivalent raw-file read. `HarnessConfigLoader` is the single config
      boundary that validates the YAML schema, resolves the active profile, merges
      profile defaults with gate-level overrides, and returns strongly-typed
      `GateConfig` objects.
      Correct usage:
        from harness_skills.gates import HarnessConfigLoader
        loader = HarnessConfigLoader("harness.config.yaml")
        cfg = loader.get_gate_config("coverage")
      Forbidden:
        import yaml; yaml.safe_load(open("harness.config.yaml"))
        pathlib.Path("harness.config.yaml").read_text()
      Test helpers that write harness.config.yaml to tmp_path and then pass the
      path to HarnessConfigLoader are compliant — the file write is setup, not
      a boundary bypass.

  - id: "MB013"
    category: "architecture"
    severity: "blocking"
    applies_to: ["review-pr", "check-code"]
    rule: >
      SECRETS / AUTH PROVIDER — direct `os.environ.get()` / `os.getenv()` calls
      for sensitive values (API keys, tokens, credentials, secrets) are permitted
      only in designated bootstrap or top-level entry-point modules:
        • harness_skills/logging_config.py  — reads LOG_LEVEL only
        • harness_skills/boot.py            — reads ANTHROPIC_API_KEY, env setup
        • Top-level scripts (checkpoint_agent.py, harness_status.py, etc.)
      All domain packages and sub-packages must receive credentials as constructor
      arguments or function parameters — never call os.environ inline inside a
      domain service, gate, plugin, or model.
      This keeps the credential surface auditable, allows tests to inject mock
      values without monkey-patching the environment, and prevents API keys from
      leaking into log records via accidental string interpolation.
      Open violations that must be refactored:
        harness_skills/stale_plan_detector.py:284
          → os.environ.get("ANTHROPIC_API_KEY") inside domain class method;
            accept api_key as a constructor parameter instead.
        harness_skills/plugins/gate_plugin.py:61
          → {**os.environ, **expanded_env} merges entire environment into
            subprocess env inside the gate class; move env preparation to
            the CLI/entry-point layer and pass the merged dict in.
      Exception: `os.environ.copy()` in harness_skills/boot.py (boot isolation)
      is compliant because boot.py is an explicitly designated bootstrap module.

  - id: "MB014"
    category: "architecture"
    severity: "blocking"
    applies_to: ["review-pr", "check-code"]
    rule: >
      PROVIDERS PATTERN (general rule) — the three cross-cutting concerns below
      must be accessed only through their designated provider. No domain package
      may bypass a provider by importing the underlying library or mechanism
      directly. This rule supersedes and extends P032 for these three concerns.

      Cross-cutting concern  | Canonical provider                          | Forbidden direct access
      -----------------------|---------------------------------------------|----------------------------------------
      Structured logging     | harness_skills.logging_config.get_logger()  | logging.getLogger(), print()
      Harness config         | harness_skills.gates.HarnessConfigLoader    | open(), yaml.safe_load(), Path.read_text()
      API secrets / auth     | constructor/parameter injection from boot   | os.environ.get("KEY") in domain code

      When a new cross-cutting concern is introduced (e.g. feature flags, metrics
      sink, distributed tracing context), a provider module must be created first
      and this principle updated before any domain code uses the new capability.
      Do not let a second implementation of any provider accumulate — consolidate
      into the single provider immediately.

